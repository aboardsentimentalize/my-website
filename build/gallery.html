        <script>
        (function() {
            const toggle = document.getElementById("menu-toggle");
            const nav = document.getElementById("site-nav");
            if (!toggle || !nav) return;

            const setExpanded = (isExpanded) => {
                nav.classList.toggle("open", isExpanded);
                toggle.setAttribute("aria-expanded", isExpanded ? "true" : "false");
            };

            toggle.addEventListener("click", () => {
                const isOpen = nav.classList.toggle("open");
                toggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
            });

            nav.querySelectorAll("a").forEach(link => {
                link.addEventListener("click", () => setExpanded(false));
            });
        })();
    </script>

            const lightbox = document.getElementById("lightbox");
            const lightboxImage = document.getElementById("lightbox-image");
            const lightboxClose = document.getElementById("lightbox-close");
            const lightboxPrev = document.getElementById("lightbox-prev");
            const lightboxNext = document.getElementById("lightbox-next");
            const lightboxCounter = document.getElementById("lightbox-counter");
            const galleryItems = document.querySelectorAll(".gallery-item");
            let playImages = fallbackPlayImages;

            const loadManifest = async () => {
                try {
                    const response = await fetch('gallery-images.json', { cache: 'no-cache' });
                    if (!response.ok) {
                        throw new Error(`Request failed with status ${response.status}`);
                    }

                    const data = await response.json();

                    if (data && typeof data === 'object') {
                        playImages = data;
                        console.log('Loaded gallery manifest:', playImages);
                    } else {
                        throw new Error('Manifest did not contain an object');
                    }
                } catch (error) {
                    console.warn('Falling back to inline gallery manifest.', error);
                    playImages = fallbackPlayImages;
                }
            };

            loadManifest();

            console.log('Elements found:', { lightbox: !!lightbox, lightboxImage: !!lightboxImage, galleryItemsCount: galleryItems.length });

            if (!lightbox || !lightboxImage || !galleryItems.length) {
                console.error('Missing required elements!', { lightbox, lightboxImage, galleryItemsCount: galleryItems.length });
                return;
            }

            let currentPlay = null;
            let currentIndex = 0;
            let currentImages = [];

            const updateImage = () => {
                if (currentImages.length === 0) return;

                lightboxImage.src = currentImages[currentIndex];
                lightboxImage.alt = `${currentPlay} - Image ${currentIndex + 1}`;

                // Update counter
                if (currentImages.length > 1) {
                    lightboxCounter.textContent = `${currentIndex + 1} / ${currentImages.length}`;
                    lightboxCounter.style.display = 'block';
                } else {
                    lightboxCounter.style.display = 'none';
                }

                // Update button states
                lightboxPrev.disabled = currentIndex === 0;
                lightboxNext.disabled = currentIndex === currentImages.length - 1;

                // Hide buttons if only one image
                if (currentImages.length <= 1) {
                    lightboxPrev.style.display = 'none';
                    lightboxNext.style.display = 'none';
                } else {
                    lightboxPrev.style.display = 'flex';
                    lightboxNext.style.display = 'flex';
                }
            };

            const openLightbox = (play, startIndex = 0) => {
                console.log('openLightbox called:', { play, startIndex, images: playImages[play] });
                currentPlay = play;
                currentImages = playImages[play] || [];

                if (!currentImages.length) {
                    console.warn(`No images found for play id "${play}".`);
                    return;
                }

                currentIndex = startIndex;
                updateImage();
                lightbox.classList.add("open");
                document.body.style.overflow = 'hidden';
                console.log('Lightbox opened, classList:', lightbox.classList.toString());
            };

            const closeLightbox = () => {
                lightbox.classList.remove("open");
                lightboxImage.removeAttribute("src");
                currentPlay = null;
                currentImages = [];
                currentIndex = 0;
                document.body.style.overflow = '';
            };

            const navigate = (direction) => {
                if (direction === 'next' && currentIndex < currentImages.length - 1) {
                    currentIndex++;
                    updateImage();
                } else if (direction === 'prev' && currentIndex > 0) {
                    currentIndex--;
                    updateImage();
                }
            };

            // Click on gallery items
            galleryItems.forEach((item, index) => {
                item.addEventListener("click", () => {
                    const play = item.getAttribute('data-play');
                    console.log('Gallery item clicked:', { index, play });
                    if (play) {
                        openLightbox(play, 0);
                    } else {
                        console.error('No data-play attribute found on clicked item');
                    }
                });
            });
            console.log('Event listeners attached to', galleryItems.length, 'gallery items');

            // Navigation buttons
            lightboxPrev.addEventListener("click", (e) => {
                e.stopPropagation();
                navigate('prev');
            });

            lightboxNext.addEventListener("click", (e) => {
                e.stopPropagation();
                navigate('next');
            });

            // Click on image to advance to next
            lightboxImage.addEventListener("click", (e) => {
                e.stopPropagation();
                navigate('next');
            });

            // Close button
            lightboxClose.addEventListener("click", (e) => {
                e.stopPropagation();
                closeLightbox();
            });

            // Click on background to close
            lightbox.addEventListener("click", (event) => {
                if (event.target === lightbox) {
                    closeLightbox();
                }
            });

            // Keyboard navigation
            document.addEventListener("keydown", (event) => {
                if (!lightbox.classList.contains("open")) return;

                switch(event.key) {
                    case "Escape":
                        closeLightbox();
                        break;
                    case "ArrowLeft":
                        navigate('prev');
                        break;
                    case "ArrowRight":
                        navigate('next');
                        break;
                }
            });
        })();
    </script>
